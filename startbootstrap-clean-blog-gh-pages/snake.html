<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --green: #4ade80;
    --green-dim: #1a3d28;
    --amber: #fbbf24;
    --red: #f87171;
    --text: #f5f5f5;
    --muted: #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 1.5rem;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(74,222,128,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(251,191,36,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--green);
    position: relative;
    z-index: 1;
    line-height: 1;
  }

  h1 span { color: var(--text); }

  #hud {
    display: flex;
    gap: 2rem;
    position: relative;
    z-index: 1;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    min-width: 3ch;
    text-align: center;
    transition: color 0.2s;
  }

  .stat-val.flash { color: var(--green); }

  #canvas-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(74,222,128,0.06), 0 0 0 1px rgba(74,222,128,0.08);
    z-index: 1;
  }

  canvas { display: block; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(13,13,13,0.88);
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  #ol-title {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
  }

  #ol-msg {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
    letter-spacing: 0.02em;
  }

  #start-btn {
    background: var(--green);
    color: #0d0d0d;
    border: none;
    border-radius: 6px;
    padding: 11px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px rgba(74,222,128,0.3);
  }

  #start-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(74,222,128,0.5); }
  #start-btn:active { transform: scale(0.97); }

  #controls {
    display: flex;
    align-items: center;
    gap: 2rem;
    position: relative;
    z-index: 1;
  }

  #speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #speed-slider {
    -webkit-appearance: none;
    width: 90px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(74,222,128,0.6);
  }

  #speed-label { color: var(--green); min-width: 5ch; font-size: 11px; }

  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 40px);
    grid-template-rows: repeat(3, 40px);
    gap: 3px;
  }

  .dpad-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }

  .dpad-btn:active, .dpad-btn.pressed {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }

  .dpad-blank { background: transparent !important; border: none !important; cursor: default; }

  #bonus-bar {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0;
    transition: opacity 0.3s;
    font-family: 'Space Mono', monospace;
    text-shadow: 0 0 12px rgba(251,191,36,0.6);
    pointer-events: none;
  }

  #bonus-bar.visible { opacity: 1; }
</style>
</head>
<body>

<h1>SN<span>AKE</span></h1>

<div id="hud">
  <div class="stat"><span class="stat-label">Score</span><span class="stat-val" id="score">0</span></div>
  <div class="stat"><span class="stat-label">Best</span><span class="stat-val" id="hi">0</span></div>
  <div class="stat"><span class="stat-label">Level</span><span class="stat-val" id="level">1</span></div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="bonus-bar" id="bonus-bar">⭐ BONUS ACTIVE</div>
  <div id="overlay">
    <div id="ol-title">SNAKE</div>
    <div id="ol-msg">Eat apples. Grow. Survive.<br>Arrow keys or d-pad to steer.</div>
    <button id="start-btn">START GAME</button>
  </div>
</div>

<div id="controls">
  <div id="speed-row">
    Speed
    <input type="range" min="1" max="5" value="2" id="speed-slider" step="1">
    <span id="speed-label">Normal</span>
  </div>

  <div id="dpad">
    <div class="dpad-btn dpad-blank"></div>
    <div class="dpad-btn" id="btn-up">▲</div>
    <div class="dpad-btn dpad-blank"></div>
    <div class="dpad-btn" id="btn-left">◀</div>
    <div class="dpad-btn dpad-blank"></div>
    <div class="dpad-btn" id="btn-right">▶</div>
    <div class="dpad-btn dpad-blank"></div>
    <div class="dpad-btn" id="btn-down">▼</div>
    <div class="dpad-btn dpad-blank"></div>
  </div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  const COLS = 20, ROWS = 20;
  let CELL;

  function resize() {
    const maxW = Math.min(window.innerWidth - 48, 440);
    const size = Math.floor(maxW / COLS) * COLS;
    CELL = size / COLS;
    canvas.width = size;
    canvas.height = size;
    wrap.style.width = size + 'px';
    if (running || !running) draw();
  }

  window.addEventListener('resize', resize);
  resize();

  const speedLabels = ['Slow', 'Normal', 'Fast', 'Blazing', 'INSANE'];
  const baseIntervals = [210, 135, 85, 55, 28];

  let snake, dir, nextDir, food, bonus, score, hiScore = 0, gameLoop, running = false, level;
  let particles = [];

  const scoreEl = document.getElementById('score');
  const hiEl = document.getElementById('hi');
  const levelEl = document.getElementById('level');
  const overlay = document.getElementById('overlay');
  const olTitle = document.getElementById('ol-title');
  const olMsg = document.getElementById('ol-msg');
  const startBtn = document.getElementById('start-btn');
  const speedSlider = document.getElementById('speed-slider');
  const speedLabelEl = document.getElementById('speed-label');
  const bonusBar = document.getElementById('bonus-bar');

  function getInterval() {
    const s = parseInt(speedSlider.value) - 1;
    return Math.max(18, baseIntervals[s] - (level - 1) * 7);
  }

  speedSlider.addEventListener('input', () => {
    speedLabelEl.textContent = speedLabels[parseInt(speedSlider.value) - 1];
    if (running) { clearInterval(gameLoop); gameLoop = setInterval(tick, getInterval()); }
  });

  function rnd(n) { return Math.floor(Math.random() * n); }

  function emptyCell() {
    const occ = new Set(snake.map(s => s[0] + ',' + s[1]));
    let x, y;
    do { x = rnd(COLS); y = rnd(ROWS); } while (occ.has(x + ',' + y));
    return [x, y];
  }

  function spawnParticles(x, y, col) {
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i + (Math.random() - 0.5) * 0.5;
      particles.push({
        x: x * CELL + CELL / 2, y: y * CELL + CELL / 2,
        vx: Math.cos(angle) * (2 + Math.random() * 3),
        vy: Math.sin(angle) * (2 + Math.random() * 3),
        life: 1, col
      });
    }
  }

  function init() {
    const mid = Math.floor(COLS / 2);
    snake = [[mid, mid], [mid - 1, mid], [mid - 2, mid]];
    dir = [1, 0]; nextDir = [1, 0];
    score = 0; level = 1;
    food = emptyCell(); bonus = null; particles = [];
    bonusBar.classList.remove('visible');
    scoreEl.textContent = 0; levelEl.textContent = 1;
    draw();
  }

  function flash(el) {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 400);
  }

  function tick() {
    dir = nextDir;
    const head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];

    if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) return end();
    if (snake.some(s => s[0] === head[0] && s[1] === head[1])) return end();

    snake.unshift(head);
    let grew = false;

    if (head[0] === food[0] && head[1] === food[1]) {
      score++; grew = true;
      spawnParticles(food[0], food[1], '#4ade80');
      food = emptyCell();
      if (score % 5 === 0) {
        level = Math.min(10, level + 1);
        levelEl.textContent = level;
        flash(levelEl);
      }
      if (score % 5 === 0 && !bonus) {
        bonus = { pos: emptyCell(), ttl: 80 };
        bonusBar.classList.add('visible');
      }
      scoreEl.textContent = score;
      flash(scoreEl);
      if (score > hiScore) { hiScore = score; hiEl.textContent = hiScore; flash(hiEl); }
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getInterval());
    }

    if (bonus) {
      bonus.ttl--;
      if (bonus.ttl <= 0) { bonus = null; bonusBar.classList.remove('visible'); }
      else if (head[0] === bonus.pos[0] && head[1] === bonus.pos[1]) {
        score += 3; grew = true;
        spawnParticles(bonus.pos[0], bonus.pos[1], '#fbbf24');
        bonus = null;
        bonusBar.classList.remove('visible');
        scoreEl.textContent = score;
        flash(scoreEl);
        if (score > hiScore) { hiScore = score; hiEl.textContent = hiScore; flash(hiEl); }
      }
    }

    if (!grew) snake.pop();

    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.85; p.vy *= 0.85; p.life -= 0.07; });
    particles = particles.filter(p => p.life > 0);

    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke(); }
    for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke(); }

    snake.forEach(([x, y], i) => {
      const t = i / snake.length;
      const alpha = 1 - t * 0.55;
      ctx.globalAlpha = alpha;
      if (i === 0) {
        ctx.shadowColor = '#4ade80';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#4ade80';
      } else {
        ctx.shadowBlur = 0;
        const g = Math.round(174 - t * 80);
        ctx.fillStyle = `rgb(20,${g},60)`;
      }
      roundRect(ctx, x * CELL + 1.5, y * CELL + 1.5, CELL - 3, CELL - 3, 4);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;

      if (i === 0) {
        ctx.fillStyle = '#0d0d0d';
        const ew = Math.max(2, CELL * 0.12);
        let ex1, ey1, ex2, ey2;
        const off = CELL * 0.22, side = CELL * 0.3;
        if (dir[0] === 1)  { ex1 = x*CELL+CELL-off; ey1 = y*CELL+side;      ex2 = x*CELL+CELL-off; ey2 = y*CELL+CELL-side; }
        else if (dir[0] === -1) { ex1 = x*CELL+off;  ey1 = y*CELL+side;      ex2 = x*CELL+off;      ey2 = y*CELL+CELL-side; }
        else if (dir[1] === -1) { ex1 = x*CELL+side; ey1 = y*CELL+off;       ex2 = x*CELL+CELL-side; ey2 = y*CELL+off; }
        else               { ex1 = x*CELL+side; ey1 = y*CELL+CELL-off; ex2 = x*CELL+CELL-side; ey2 = y*CELL+CELL-off; }
        ctx.beginPath(); ctx.arc(ex1, ey1, ew, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, ew, 0, Math.PI * 2); ctx.fill();
      }
    });

    ctx.shadowBlur = 0;

    drawFood(food[0], food[1], false);
    if (bonus) {
      const flash = bonus.ttl > 15 ? true : Math.floor(bonus.ttl / 4) % 2 === 0;
      if (flash) drawBonus(bonus.pos[0], bonus.pos[1], bonus.ttl);
    }

    particles.forEach(p => {
      ctx.globalAlpha = p.life * 0.8;
      ctx.fillStyle = p.col;
      ctx.shadowColor = p.col;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function drawFood(x, y, isBonus) {
    const cx = x * CELL + CELL / 2, cy = y * CELL + CELL / 2;
    ctx.shadowColor = '#4ade80';
    ctx.shadowBlur = 10;
    ctx.font = `${Math.round(CELL * 0.72)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🍎', cx, cy + 1);
    ctx.shadowBlur = 0;
  }

  function drawBonus(x, y, ttl) {
    const cx = x * CELL + CELL / 2, cy = y * CELL + CELL / 2;
    const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 120);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(pulse, pulse);
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 16;
    ctx.font = `${Math.round(CELL * 0.72)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', 0, 1);
    ctx.restore();
    ctx.shadowBlur = 0;

    const pct = ttl / 80;
    ctx.strokeStyle = `rgba(251,191,36,${0.3 + pct * 0.4})`;
    ctx.lineWidth = 1.5;
    const r = CELL / 2 - 1;
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
    ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function end() {
    clearInterval(gameLoop); running = false;
    bonusBar.classList.remove('visible');
    olTitle.textContent = 'GAME OVER';
    olMsg.innerHTML = `You scored <b style="color:#4ade80">${score}</b>. Best: <b style="color:#4ade80">${hiScore}</b>.<br>The snake has perished.`;
    startBtn.textContent = 'TRY AGAIN';
    overlay.classList.remove('hidden');
  }

  startBtn.addEventListener('click', () => {
    overlay.classList.add('hidden');
    init();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, getInterval());
    running = true;
  });

  document.addEventListener('keydown', e => {
    const map = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0] };
    if (map[e.key]) {
      e.preventDefault();
      const nd = map[e.key];
      if (nd[0] !== -dir[0] || nd[1] !== -dir[1]) nextDir = nd;
    }
  });

  function bindDpad(id, d, btnId) {
    const btn = document.getElementById(btnId);
    btn.addEventListener('click', () => {
      if (!running) return;
      if (d[0] !== -dir[0] || d[1] !== -dir[1]) nextDir = d;
    });
    btn.addEventListener('touchstart', e => { e.preventDefault(); btn.classList.add('pressed'); }, { passive: false });
    btn.addEventListener('touchend', () => btn.classList.remove('pressed'));
  }

  bindDpad('up',    [0,-1],  'btn-up');
  bindDpad('down',  [0,1],   'btn-down');
  bindDpad('left',  [-1,0],  'btn-left');
  bindDpad('right', [1,0],   'btn-right');

  speedLabelEl.textContent = speedLabels[parseInt(speedSlider.value) - 1];
  init();
</script>
</body>
</html>
